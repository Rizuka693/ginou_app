<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: Arial, sans-serif; padding: 20px; }
      input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
      button { width: 100%; padding: 10px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; }
      button:hover { background-color: #27ae60; }
    </style>
  </head>
  <body>
    <h3>外国人申し込み</h3>
    <input type="text" id="nama" placeholder="名前（アルファベット）">
    <select id="visa">
      <option value="技能実習生">技能実習生</option>
      <option value="特定技能">特定技能</option>
    </select>
    <button onclick="DataSend()">登録</button>

    <script>
      function DataSend() {
        var nama = document.getElementById("nama").value;
        var visa = document.getElementById("visa").value;
        
        // Memanggil fungsi 'tambahData' yang ada di Code.gs
        google.script.run
          .withSuccessHandler(function() {
             alert("申し込み完了！");
             document.getElementById("nama").value = ""; // Kosongkan form setelah isi
          })
          .tambahData(nama, visa);
      }
    </script>
  </body>
</html>
